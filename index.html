<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ShiftOne v3.6</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: sans-serif; padding: 10px; }
.card { border:1px solid #ccc; padding:10px; margin:10px 0; }
button { padding:8px; margin:5px; }
</style>
</head>

<body>

<h2>ShiftOne v3.6</h2>

<!-- 員工 -->
<div class="card">
<h3>員工</h3>
<input id="name" placeholder="姓名">

<select id="type">
  <option>正職</option>
  <option>工讀</option>
</select>

<br><br>

<h4>可上班時間（09-23）</h4>
<div id="hours"></div>

<h4>休假</h4>
<input type="date" id="offDate">
<button onclick="addOff()">加入休假</button>
<div id="offList"></div>

<br>
<button onclick="addEmp()">新增員工</button>
</div>

<!-- 排班 -->
<div class="card">
<h3>排班</h3>
<button onclick="auto()">自動排班</button>
<button onclick="exportICS()">輸出ICS</button>
</div>

<!-- 結果 -->
<div class="card">
<h3>結果</h3>
<div id="result"></div>
</div>

<script>
let employees = [];
let schedule = [];

let offTemp = [];


// 小時勾選
let hoursDiv = document.getElementById("hours");
let hours = [];

for(let i=9;i<=23;i++){
  let h = document.createElement("label");
  h.innerHTML = `<input type='checkbox' value='${i}'> ${i}:00 `;
  hoursDiv.appendChild(h);
}


// 加休假
function addOff(){
  offTemp.push(offDate.value);
  document.getElementById("offList").innerHTML = offTemp.join(", ");
}


// 新增員工
function addEmp(){

  let checked = [...document.querySelectorAll("#hours input:checked")]
    .map(e=>Number(e.value));

  employees.push({
    name: name.value,
    type: type.value,
    hours: checked,
    off: [...offTemp]
  });

  alert("已新增 " + name.value);

  name.value = "";
  offTemp = [];
  document.getElementById("offList").innerHTML = "";
}


// 自動排班（簡化穩定版）
function auto(){

  schedule = [];

  for(let h=9;h<=23;h++){

    let available = employees.filter(e=>{
      return e.hours.includes(h);
    });

    if(available.length>0){
      schedule.push({
        hour:h,
        name: available[0].name
      });
    }
  }

  render();
}


// 顯示
function render(){
  document.getElementById("result").innerHTML =
    schedule.map(s=>`${s.hour}:00 - ${s.name}`).join("<br>");
}


// ICS輸出（TimeTree用）
function exportICS(){

  let ics = "BEGIN:VCALENDAR\nVERSION:2.0\n";

  schedule.forEach(s=>{
    ics += `
BEGIN:VEVENT
SUMMARY:${s.name}
DTSTART:20260421T${String(s.hour).padStart(2,'0')}0000
DTEND:20260421T${String(s.hour+1).padStart(2,'0')}0000
END:VEVENT`;
  });

  ics += "\nEND:VCALENDAR";

  let blob = new Blob([ics], {type:"text/calendar"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "shift.ics";
  a.click();
}

</script>

</body>
</html>
