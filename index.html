<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ShiftOne v3.6</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: sans-serif; padding:10px; }
.card { border:1px solid #ccc; padding:10px; margin:10px 0; }
.warn { color:red; }
label { display:inline-block; width:70px; }
</style>
</head>

<body>

<h2>ShiftOne v3.6（穩定版）</h2>

<div class="card">
<h3>排班日期</h3>
開始：<input type="date" id="start"><br><br>
結束：<input type="date" id="end">
</div>

<div class="card">
<h3>新增員工</h3>

<input id="empName" placeholder="姓名"><br><br>

主店：
<select id="mainStore">
  <option value="A">A店</option>
  <option value="B">B店</option>
</select>

<br><br>

支援店：
<label><input type="checkbox" value="A" class="storeCheck">A</label>
<label><input type="checkbox" value="B" class="storeCheck">B</label>

<h4>可上班時間（點選）</h4>
<div id="hours"></div>

<h4>休假</h4>
<input type="date" id="offDate">
<button onclick="addOff()">加入</button>
<div id="offList"></div>

<br>
<button onclick="addEmp()">新增員工</button>
</div>

<div class="card">
<button onclick="auto()">自動排班</button>
<button onclick="exportICS()">輸出ICS</button>
</div>

<div class="card">
<h3>班表</h3>
<div id="result"></div>
</div>

<div class="card">
<h3>缺人提醒</h3>
<div id="warn"></div>
</div>

<script>

let employees = [];
let schedule = [];
let offTemp = [];

// ✅ 正確初始化時段（已修）
let hoursDiv = document.getElementById("hours");
for(let i=9;i<=23;i++){
  hoursDiv.innerHTML += `
    <label>
      <input type="checkbox" value="${i}"> ${i}:00
    </label>
  `;
}

// 加休假
function addOff(){
  let d = document.getElementById("offDate").value;
  if(d){
    offTemp.push(d);
    document.getElementById("offList").innerText = offTemp.join(", ");
  }
}

// 新增員工（完全修正 undefined）
function addEmp(){

  let name = document.getElementById("empName").value.trim();
  if(!name){
    alert("請輸入姓名");
    return;
  }

  let main = document.getElementById("mainStore").value;

  let support = [...document.querySelectorAll(".storeCheck:checked")]
    .map(e=>e.value)
    .filter(v=>v !== main);

  let hrs = [...document.querySelectorAll("#hours input:checked")]
    .map(e=>Number(e.value));

  employees.push({
    name: name,
    mainStore: main,
    supportStores: support,
    hours: hrs,
    off: [...offTemp]
  });

  alert("已新增 " + name);

  document.getElementById("empName").value = "";
  offTemp = [];
  document.getElementById("offList").innerText = "";

  // 清除勾選
  document.querySelectorAll("#hours input").forEach(e=>e.checked=false);
  document.querySelectorAll(".storeCheck").forEach(e=>e.checked=false);
}

// 日期
function getDates(s,e){
  let arr=[];
  let d=new Date(s);
  while(d<=new Date(e)){
    arr.push(d.toISOString().slice(0,10));
    d.setDate(d.getDate()+1);
  }
  return arr;
}

// 自動排班
function auto(){

  schedule = [];
  let warn = {};

  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;

  if(!start || !end){
    alert("請選日期");
    return;
  }

  let dates = getDates(start,end);

  dates.forEach(date=>{

    ["A","B"].forEach(store=>{

      for(let h=9;h<=23;h++){

        let need = 1;

        let mainEmp = employees.filter(e=>
          e.mainStore === store &&
          e.hours.includes(h) &&
          !e.off.includes(date)
        );

        let supportEmp = employees.filter(e=>
          e.supportStores.includes(store) &&
          e.hours.includes(h) &&
          !e.off.includes(date)
        );

        let assigned = [];

        if(mainEmp.length >= need){
          assigned = mainEmp.slice(0,need);
        }else{
          assigned = [...mainEmp];
          let remain = need - mainEmp.length;
          assigned.push(...supportEmp.slice(0,remain));
        }

        if(assigned.length < need){
          warn[`${date} ${store} ${h}:00`] = need - assigned.length;
        }

        assigned.forEach(e=>{
          schedule.push({
            date,
            store,
            hour:h,
            name:e.name
          });
        });

      }

    });

  });

  render();
  renderWarn(warn);
}

// 顯示班表
function render(){
  document.getElementById("result").innerHTML =
    schedule.map(s=>
      `${s.date} ${s.store} ${s.hour}:00 - ${s.name}`
    ).join("<br>");
}

// 缺人提醒
function renderWarn(w){
  let html = Object.entries(w)
    .map(([k,v])=>`<div class="warn">${k} 缺 ${v} 人</div>`)
    .join("");

  document.getElementById("warn").innerHTML = html || "沒有缺人";
}

// ICS輸出
function exportICS(){

  let ics="BEGIN:VCALENDAR\nVERSION:2.0\n";

  schedule.forEach(s=>{
    let d = s.date.replace(/-/g,"");
    ics+=`
BEGIN:VEVENT
SUMMARY:${s.name} (${s.store})
DTSTART:${d}T${String(s.hour).padStart(2,'0')}0000
DTEND:${d}T${String(s.hour+1).padStart(2,'0')}0000
END:VEVENT`;
  });

  ics+="\nEND:VCALENDAR";

  let blob=new Blob([ics],{type:"text/calendar"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="shift.ics";
  a.click();
}

</script>

</body>
</html>
