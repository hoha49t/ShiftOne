<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ShiftOne v4.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:sans-serif; padding:10px;}
.card { border:1px solid #ccc; padding:10px; margin:10px 0;}
.warn { color:red;}
.emp { margin:5px 0; padding:5px; border-bottom:1px solid #eee;}
</style>
</head>

<body>

<h2>ShiftOne v4.1（可用版）</h2>

<div class="card">
開始：<input type="date" id="start">
結束：<input type="date" id="end">
</div>

<div class="card">
<h3>新增員工</h3>

<input id="name" placeholder="姓名">

<select id="type">
  <option>正職</option>
  <option>兼職</option>
  <option>工讀生</option>
</select>

<br><br>

店別：
<select id="storeMode">
  <option value="大安">固定大安</option>
  <option value="遼寧">固定遼寧</option>
  <option value="flex">可調店</option>
</select>

<br><br>

<label>
  <input type="checkbox" id="tea"> 會煮茶（早班）
</label>

<br><br>

<h4>休假設定</h4>
<input type="date" id="offDate">
<button onclick="addOff()">加入休假</button>
<div id="offPreview"></div>

<br>
<button onclick="addEmp()">新增員工</button>
</div>

<div class="card">
<h3>員工列表</h3>
<div id="empList"></div>
</div>

<div class="card">
<button onclick="auto()">自動排班</button>
</div>

<div class="card">
<h3>班表</h3>
<div id="result"></div>
</div>

<script>

// ===== 狀態 =====
let employees = [];
let offTemp = [];

// ===== DOM =====
const nameInput = document.getElementById("name");
const typeSelect = document.getElementById("type");
const storeSelect = document.getElementById("storeMode");
const teaCheck = document.getElementById("tea");
const offDateInput = document.getElementById("offDate");
const offPreview = document.getElementById("offPreview");
const empListDiv = document.getElementById("empList");
const startInput = document.getElementById("start");
const endInput = document.getElementById("end");
const resultDiv = document.getElementById("result");

// ===== 加休假（可累加）=====
function addOff(){
  let d = offDateInput.value;
  if(d && !offTemp.includes(d)){
    offTemp.push(d);
    offPreview.innerText = "暫存休假：" + offTemp.join(", ");
  }
}

// ===== 新增員工 =====
function addEmp(){

  let n = nameInput.value.trim();
  if(!n){
    alert("請輸入姓名");
    return;
  }

  let t = typeSelect.value;
  let storeMode = storeSelect.value;
  let tea = teaCheck.checked;

  let lower = n.toLowerCase();

  // 固定員工規則
  if(lower=="joe") storeMode="大安";
  if(n=="翊安") storeMode="大安";
  if(n=="曉鈴") storeMode="遼寧";

  employees.push({
    name:n,
    type:t,
    storeMode:storeMode,
    tea:tea,
    off:[...offTemp]
  });

  alert("已新增 "+n);

  // 清空輸入
  nameInput.value="";
  offTemp=[];
  offPreview.innerText="";
  teaCheck.checked=false;

  renderEmp();
}

// ===== 顯示員工列表 =====
function renderEmp(){
  if(employees.length===0){
    empListDiv.innerHTML="（尚未新增員工）";
    return;
  }

  empListDiv.innerHTML = employees.map(e => `
    <div class="emp">
      <b>${e.name}</b>｜${e.type}｜${e.storeMode}｜${e.tea ? "會煮茶" : "不會煮茶"}
      <br>休假：${e.off.length ? e.off.join(", ") : "無"}
    </div>
  `).join("");
}

// ===== 日期工具 =====
function getDates(s,e){
  let arr=[];
  let d=new Date(s);
  while(d<=new Date(e)){
    arr.push(new Date(d));
    d.setDate(d.getDate()+1);
  }
  return arr;
}

// joe固定休假
function isJoeOff(date){
  let day=date.getDay();
  return (day==3 || day==6 || day==0);
}

// ===== 排班 =====
function auto(){

  let start=startInput.value;
  let end=endInput.value;

  if(!start || !end){
    alert("請選日期");
    return;
  }

  let dates=getDates(start,end);
  let html="";

  dates.forEach(d=>{

    let dateStr=d.toISOString().slice(0,10);

    html+=`<h3>${d.toLocaleDateString()}</h3>`;

    // ===== 大安 =====
    html+="<b>大安</b><br>";

    let daan = employees.filter(e=>{
      if(e.name.toLowerCase()=="joe" && isJoeOff(d)) return false;
      return (e.storeMode=="大安" || e.storeMode=="flex") &&
             !e.off.includes(dateStr);
    });

    let early = daan.filter(e=>e.tea);

    html += early.length
      ? `10:00-22:00 ${early[0].name}<br>`
      : `<span class="warn">缺早班</span><br>`;

    html += daan.length > 1
      ? `11:00-23:00 ${daan[1].name}<br>`
      : `<span class="warn">缺晚班</span><br>`;

    // ===== 遼寧 =====
    html+="<b>遼寧</b><br>";

    let ln = employees.filter(e=>{
      if(e.name.toLowerCase()=="joe" && isJoeOff(d)) return false;
      return (e.storeMode=="遼寧" || e.storeMode=="flex") &&
             !e.off.includes(dateStr);
    });

    let early2 = ln.filter(e=>e.tea);

    html += early2.length
      ? `10:00-22:00 ${early2[0].name}<br>`
      : `<span class="warn">缺早班</span><br>`;

    html += ln.length > 1
      ? `11:00-22:00 ${ln[1].name}<br>`
      : `<span class="warn">缺晚班</span><br>`;

  });

  resultDiv.innerHTML = html;
}

</script>

</body>
</html>
