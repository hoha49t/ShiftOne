<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ShiftOne v3.6</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: sans-serif; padding: 10px; }
.card { border:1px solid #ccc; padding:10px; margin:10px 0; }
button { padding:8px; margin:5px; }
.warn { color:red; }
</style>
</head>

<body>

<h2>ShiftOne v3.6</h2>

<!-- 日期 -->
<div class="card">
<h3>排班日期</h3>
開始：<input type="date" id="start">
結束：<input type="date" id="end">
</div>

<!-- 員工 -->
<div class="card">
<h3>員工</h3>

<input id="empName" placeholder="姓名">

<select id="empType">
  <option>正職</option>
  <option>工讀</option>
</select>

<h4>可上班時間（09–23）</h4>
<div id="hours"></div>

<h4>休假</h4>
<input type="date" id="offDate">
<button onclick="addOff()">加入休假</button>
<div id="offList"></div>

<br>
<button onclick="addEmp()">新增員工</button>
</div>

<!-- 排班 -->
<div class="card">
<h3>排班</h3>
<button onclick="auto()">自動排班</button>
<button onclick="exportICS()">輸出ICS</button>
</div>

<!-- 結果 -->
<div class="card">
<h3>班表</h3>
<div id="result"></div>
</div>

<!-- 缺人 -->
<div class="card">
<h3>缺人提醒</h3>
<div id="warn"></div>
</div>

<script>

let employees = [];
let schedule = [];
let offTemp = [];

// 小時
let hoursDiv = document.getElementById("hours");
for(let i=9;i<=23;i++){
  hoursDiv.innerHTML += `<label><input type="checkbox" value="${i}">${i}:00 </label>`;
}

// 加休假
function addOff(){
  let d = document.getElementById("offDate").value;
  if(d){
    offTemp.push(d);
    document.getElementById("offList").innerText = offTemp.join(", ");
  }
}

// 新增員工（修正 undefined）
function addEmp(){

  let name = document.getElementById("empName").value.trim();
  if(!name){
    alert("請輸入姓名");
    return;
  }

  let type = document.getElementById("empType").value;

  let hours = [...document.querySelectorAll("#hours input:checked")]
    .map(e=>Number(e.value));

  employees.push({
    name,
    type,
    hours,
    off: [...offTemp]
  });

  alert("已新增 " + name);

  document.getElementById("empName").value = "";
  offTemp = [];
  document.getElementById("offList").innerText = "";
}


// 產生日期
function getDates(start,end){
  let arr=[];
  let d=new Date(start);
  while(d<=new Date(end)){
    arr.push(d.toISOString().slice(0,10));
    d.setDate(d.getDate()+1);
  }
  return arr;
}


// 自動排班 + 缺人
function auto(){

  schedule = [];
  let warn = {};

  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;

  if(!start || !end){
    alert("請選日期");
    return;
  }

  let dates = getDates(start,end);

  dates.forEach(date=>{

    for(let h=9;h<=23;h++){

      let need = 1; // 每小時需要1人（你之後可改）

      let available = employees.filter(e=>{
        if(e.off.includes(date)) return false;
        return e.hours.includes(h);
      });

      if(available.length < need){
        warn[`${date} ${h}:00`] = need - available.length;
      }

      available.slice(0,need).forEach(e=>{
        schedule.push({
          date,
          hour:h,
          name:e.name
        });
      });

    }

  });

  render();
  renderWarn(warn);
}


// 顯示
function render(){
  document.getElementById("result").innerHTML =
    schedule.map(s=>`${s.date} ${s.hour}:00 - ${s.name}`).join("<br>");
}

// 缺人
function renderWarn(warn){
  let w = Object.entries(warn)
    .map(([k,v])=>`<div class="warn">${k} 缺 ${v} 人</div>`)
    .join("");

  document.getElementById("warn").innerHTML = w || "沒有缺人";
}


// ICS
function exportICS(){

  let ics="BEGIN:VCALENDAR\nVERSION:2.0\n";

  schedule.forEach(s=>{
    ics+=`
BEGIN:VEVENT
SUMMARY:${s.name}
DTSTART:${s.date.replace(/-/g,"")}T${String(s.hour).padStart(2,'0')}0000
DTEND:${s.date.replace(/-/g,"")}T${String(s.hour+1).padStart(2,'0')}0000
END:VEVENT`;
  });

  ics+="\nEND:VCALENDAR";

  let blob=new Blob([ics],{type:"text/calendar"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="shift.ics";
  a.click();
}

</script>

</body>
</html>
