<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ShiftOne v3.7</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:sans-serif; padding:10px;}
.card { border:1px solid #ccc; padding:10px; margin:10px 0;}
.warn { color:red;}
</style>
</head>

<body>

<h2>ShiftOne v3.7（營運版）</h2>

<div class="card">
開始：<input type="date" id="start">
結束：<input type="date" id="end">
</div>

<div class="card">
<h3>新增員工</h3>

<input id="name" placeholder="姓名">

<select id="type">
  <option>正職</option>
  <option>兼職</option>
  <option>工讀生</option>
</select>

<br><br>

主店：
<select id="store">
  <option>大安</option>
  <option>遼寧</option>
</select>

<br><br>

<label>
  <input type="checkbox" id="tea"> 會煮茶（可上早班）
</label>

<br><br>

<button onclick="addEmp()">新增員工</button>
</div>

<div class="card">
<button onclick="auto()">自動排班</button>
</div>

<div class="card">
<h3>班表</h3>
<div id="result"></div>
</div>

<script>

let employees=[];

// 新增員工
function addEmp(){

  let name=document.getElementById("name").value.trim();
  if(!name){ alert("請輸入姓名"); return; }

  let type=document.getElementById("type").value;
  let store=document.getElementById("store").value;
  let tea=document.getElementById("tea").checked;

  employees.push({name,type,store,tea});

  alert("已新增 "+name);
  document.getElementById("name").value="";
}

// 日期
function getDates(s,e){
  let arr=[];
  let d=new Date(s);
  while(d<=new Date(e)){
    arr.push(new Date(d));
    d.setDate(d.getDate()+1);
  }
  return arr;
}

// 排班（核心邏輯）
function auto(){

  let start=document.getElementById("start").value;
  let end=document.getElementById("end").value;

  if(!start||!end){
    alert("請選日期");
    return;
  }

  let dates=getDates(start,end);
  let html="";

  dates.forEach(d=>{

    html+=`<h3>${d.toLocaleDateString()}</h3>`;

    // ===== 大安 =====
    html+="<b>大安</b><br>";

    let daan=employees.filter(e=>e.store=="大安");

    // 早班（會煮茶）
    let early=daan.filter(e=>e.tea);

    if(early.length>0){
      html+=`10:00-22:00 ${early[0].name}<br>`;
    }else{
      html+=`<span class="warn">缺早班</span><br>`;
    }

    // 晚班
    let late=daan.filter(e=>!e.tea || true);

    if(late.length>1){
      html+=`11:00-23:00 ${late[1].name}<br>`;
    }else{
      html+=`<span class="warn">缺晚班</span><br>`;
    }

    // ===== 遼寧 =====
    html+="<b>遼寧</b><br>";

    let liaoning=employees.filter(e=>e.store=="遼寧");

    let early2=liaoning.filter(e=>e.tea);

    if(early2.length>0){
      html+=`10:00-22:00 ${early2[0].name}<br>`;
    }else{
      html+=`<span class="warn">缺早班</span><br>`;
    }

    let late2=liaoning;

    if(late2.length>1){
      html+=`11:00-22:00 ${late2[1].name}<br>`;
    }else{
      html+=`<span class="warn">缺晚班</span><br>`;
    }

  });

  document.getElementById("result").innerHTML=html;
}

</script>

</body>
</html>
